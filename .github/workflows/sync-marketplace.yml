name: Sync marketplace

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - '.codex-plugin/**'
      - '.claude-plugin/**'
      - '.github/plugin/**'
      - 'scripts/sync-marketplace.mjs'
      - '.github/workflows/sync-marketplace.yml'
  pull_request:
    branches: [main]
    paths:
      - 'plugins/**'
      - '.codex-plugin/**'
      - '.claude-plugin/**'
      - '.github/plugin/**'
      - 'scripts/sync-marketplace.mjs'
      - '.github/workflows/sync-marketplace.yml'
  workflow_dispatch:

concurrency:
  group: sync-marketplace-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Verify generated plugin files are up to date
        run: node scripts/sync-marketplace.mjs --check

  sync:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate marketplace
        run: node scripts/sync-marketplace.mjs

      - name: Commit if changed
        run: |
          if [[ -z "$(git status --porcelain plugins .github/plugin .codex-plugin .claude-plugin)" ]]; then
            echo "generated plugin files already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plugins .github/plugin .codex-plugin .claude-plugin
          git commit -m "chore: sync plugin manifests [skip ci]"
          git push
