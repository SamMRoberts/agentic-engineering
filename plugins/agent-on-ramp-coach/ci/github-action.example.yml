name: Agent On-Ramp Session Check

on:
  pull_request:
  workflow_dispatch:

jobs:
  onramp-session:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Check adoption-session artifact
        run: node skills/agent-on-ramp-coach/scripts/onramp.mjs check

# This CI sample is optional. It is most useful when a team wants to enforce
# adoption-session artifacts for agent-generated branches or pull requests.
