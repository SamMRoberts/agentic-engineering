name: Scope Guard Gate

on:
  pull_request:
    branches: [main]

jobs:
  scope-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Scope Guard plan check
        run: node plugins/scope-guard/bin/scope-guard.mjs check
