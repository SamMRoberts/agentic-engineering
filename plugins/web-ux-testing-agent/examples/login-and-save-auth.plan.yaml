schema_version: "1.0"
id: login-and-save-auth
title: Log in and verify the authenticated dashboard
description: >
  Validates the login workflow and the first authenticated view. Intended to be
  run once to confirm credentials work; the saved storage state is reused by
  other plans via environment.auth.strategy = storage_state.
tags: [auth, smoke]

environment:
  name: staging
  base_url: ${BASE_URL}
  stage: staging
  test_id_attribute: data-testid
  browsers: [chromium]
  auth:
    required: true
    strategy: env_credentials
    username_env: APP_USERNAME
    password_env: APP_PASSWORD
  destructive_actions_allowed: false

preconditions:
  - APP_USERNAME and APP_PASSWORD are set in the environment (never in the plan).

steps:
  - id: go-to-login
    title: Go to the login page
    action: navigate
    url: ${BASE_URL}/login

  - id: fill-username
    title: Fill in the username
    action: fill
    target: { label: Username }
    value: ${APP_USERNAME}

  - id: fill-password
    title: Fill in the password
    action: fill
    target: { label: Password }
    value: ${APP_PASSWORD}

  - id: submit-login
    title: Submit the login form
    action: click
    target: { role: button, name: Sign in }

  - id: wait-for-dashboard
    title: Wait for the dashboard to load
    action: wait_for
    state: visible
    target: { role: heading, name: Dashboard }

assertions:
  - id: verify-dashboard
    title: Verify the dashboard is shown
    action: assert_visible
    target: { role: heading, name: Dashboard }

  - id: verify-user-menu
    title: Verify the user menu is present
    action: assert_visible
    target: { role: button, name: Account }

metadata:
  author: web-ux-planner
  note: "Values use ${ENV} indirection so no credentials are stored in the plan."
