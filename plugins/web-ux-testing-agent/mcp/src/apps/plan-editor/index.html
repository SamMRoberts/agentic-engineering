<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Web UX Plan Editor</title>
    <style>
      :root { color-scheme: light dark; --accent: #1d4ed8; }
      body { font-family: ui-sans-serif, system-ui, sans-serif; margin: 0; padding: 1rem; }
      header { display: flex; align-items: center; gap: .75rem; margin-bottom: .75rem; }
      h1 { font-size: 1.1rem; margin: 0; }
      textarea { width: 100%; box-sizing: border-box; min-height: 22rem; font-family: ui-monospace, monospace; font-size: 12px; padding: .5rem; }
      .row { display: flex; gap: .5rem; align-items: center; margin: .5rem 0; flex-wrap: wrap; }
      button { background: var(--accent); color: #fff; border: 0; border-radius: 6px; padding: .45rem .8rem; cursor: pointer; }
      button.secondary { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
      .msg { white-space: pre-wrap; font-family: ui-monospace, monospace; font-size: 12px; padding: .5rem; border-radius: 6px; }
      .err { background: #fee2e2; color: #991b1b; }
      .ok { background: #dcfce7; color: #166534; }
      .warn { background: #fef9c3; color: #854d0e; }
      input { padding: .35rem; }
    </style>
  </head>
  <body>
    <header>
      <h1>Web UX Plan Editor</h1>
      <span id="plansDir" style="opacity:.7;font-size:12px"></span>
    </header>
    <div class="row">
      <input id="planName" placeholder="my.plan.yaml" size="32" />
      <button class="secondary" id="validateBtn">Validate</button>
      <button id="saveBtn">Save (confirm)</button>
    </div>
    <textarea id="editor" spellcheck="false" placeholder="# Paste or edit plan YAML here"></textarea>
    <div id="status" class="msg"></div>

    <script type="module">
      // Defensive MCP Apps bridge: the host injects the tool result and exposes a
      // callTool function under different globals across hosts. We detect what is
      // available and degrade gracefully when running standalone.
      const bridge = window.mcpApp || window.openai || window.mcp || null;

      const $ = (id) => document.getElementById(id);
      const editor = $("editor");
      const status = $("status");

      function show(kind, text) {
        status.className = "msg " + kind;
        status.textContent = text;
      }

      async function callTool(name, args) {
        if (bridge && typeof bridge.callTool === "function") {
          return await bridge.callTool(name, args);
        }
        throw new Error("No MCP host bridge available (standalone preview). Use the local web UI for full editing.");
      }

      // Receive initial structuredContent (host posts it or sets it on the bridge).
      function applyInitial(data) {
        if (!data) return;
        if (data.plansDir) $("plansDir").textContent = data.plansDir;
        if (data.plan) $("planName").value = data.plan;
        if (data.yaml) editor.value = data.yaml;
      }
      applyInitial(bridge && bridge.toolOutput);
      window.addEventListener("message", (e) => {
        if (e.data && (e.data.structuredContent || e.data.toolOutput)) {
          applyInitial(e.data.structuredContent || e.data.toolOutput);
        }
      });

      function renderValidation(v) {
        if (!v) return;
        const lines = [
          ...(v.warnings || []).map((w) => "WARN: " + w),
          ...(v.errors || []).map((er) => "ERROR: " + er)
        ];
        if ((v.errors || []).length) show("err", lines.join("\n"));
        else if ((v.warnings || []).length) show("warn", lines.join("\n"));
        else show("ok", "Plan is valid.");
      }

      $("validateBtn").addEventListener("click", async () => {
        try {
          const res = await callTool("validate_plan", { planYaml: editor.value });
          renderValidation(res.structuredContent || res);
        } catch (err) {
          show("err", String(err.message || err));
        }
      });

      $("saveBtn").addEventListener("click", async () => {
        const plan = $("planName").value.trim();
        if (!plan) return show("err", "Enter a plan file name first.");
        try {
          const res = await callTool("save_plan", {
            plan,
            planYaml: editor.value,
            confirmedWrite: true
          });
          const sc = res.structuredContent || res;
          if (sc.written) show("ok", "Saved to " + sc.planPath);
          else renderValidation(sc.validation);
        } catch (err) {
          show("err", String(err.message || err));
        }
      });
    </script>
  </body>
</html>
