$schema: https://json-schema.org/draft/2020-12/schema
$id: https://github.com/SamMRoberts/agentic-engineering/plugins/web-ux-test/schemas/test-plan.schema.yaml
title: WebUxTestPlan
description: A Playwright UX test plan. Validated before any side effect.
type: object
required: [id, name, target, plan]
additionalProperties: false
properties:
  id:
    type: string
    pattern: "^[a-z0-9][a-z0-9-]{1,62}[a-z0-9]$"
    description: Kebab-case identifier; used in run IDs and generated spec file names.
  name:
    type: string
    minLength: 1
    maxLength: 200
  description:
    type: string
    maxLength: 4000
  target:
    type: object
    required: [baseUrl]
    additionalProperties: false
    properties:
      baseUrl:
        type: string
        format: uri
      browser:
        type: string
        enum: [chromium, firefox, webkit]
        default: chromium
  auth:
    type: object
    additionalProperties: false
    properties:
      required:
        type: boolean
        default: false
      mode:
        type: string
        enum: [none, storageState]
        default: none
      storageStatePath:
        type: string
        minLength: 1
    allOf:
      - if:
          properties:
            required:
              const: true
            mode:
              const: storageState
          required: [required, mode]
        then:
          required: [storageStatePath]
  execution:
    type: object
    additionalProperties: false
    properties:
      timeoutMs:
        type: integer
        minimum: 1000
        maximum: 600000
        default: 60000
      retries:
        type: integer
        minimum: 0
        maximum: 5
        default: 0
      headless:
        type: boolean
        default: true
  plan:
    type: array
    minItems: 1
    items:
      $ref: "#/$defs/step"
$defs:
  expectation:
    type: object
    required: [type]
    additionalProperties: false
    properties:
      type:
        type: string
        enum: [visible, hidden, formValid, urlMatches, textContains]
      selector:
        type: string
        minLength: 1
      pattern:
        type: string
        minLength: 1
      text:
        type: string
    allOf:
      - if:
          properties:
            type:
              enum: [visible, hidden, textContains]
        then:
          required: [selector]
      - if:
          properties:
            type:
              const: textContains
        then:
          required: [selector, text]
      - if:
          properties:
            type:
              const: urlMatches
        then:
          required: [pattern]
  step:
    type: object
    required: [id, action]
    additionalProperties: false
    properties:
      id:
        type: string
        pattern: "^[a-z0-9][a-z0-9-]{0,62}$"
      description:
        type: string
        maxLength: 500
      action:
        type: string
        enum: [goto, click, fillForm, waitFor, assertVisible, assertHidden, type, press]
      target:
        type: string
      selector:
        type: string
      value:
        type: string
      key:
        type: string
      fields:
        type: array
        minItems: 1
        items:
          type: object
          required: [selector, value]
          additionalProperties: false
          properties:
            selector:
              type: string
              minLength: 1
            value:
              type: string
      expect:
        type: array
        minItems: 0
        items:
          $ref: "#/$defs/expectation"
    allOf:
      - if:
          properties:
            action:
              const: goto
        then:
          required: [target]
      - if:
          properties:
            action:
              enum: [click, waitFor, assertVisible, assertHidden]
        then:
          required: [selector]
      - if:
          properties:
            action:
              const: type
        then:
          required: [selector, value]
      - if:
          properties:
            action:
              const: press
        then:
          required: [key]
      - if:
          properties:
            action:
              const: fillForm
        then:
          required: [fields]
