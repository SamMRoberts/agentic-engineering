$schema: https://json-schema.org/draft/2020-12/schema
$id: https://github.com/SamMRoberts/agentic-engineering/plugins/web-ux-test/schemas/repair-proposal.schema.yaml
title: WebUxTestRepairProposal
description: A proposed repair for a failing test run. Must be approved before apply.
type: object
required: [proposalId, runId, failureCategory, summary, proposedChanges, requiresApproval]
additionalProperties: false
properties:
  proposalId:
    type: string
    pattern: "^repair-[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}-[0-9]{2}-[0-9]{2}-[a-z0-9-]+$"
  runId:
    type: string
  failureCategory:
    type: string
    enum:
      - selector_not_found
      - timeout
      - navigation_failure
      - auth_failure
      - assertion_failure
      - network_failure
      - application_error
      - unknown
  summary:
    type: string
    minLength: 1
    maxLength: 2000
  rationale:
    type: string
    maxLength: 4000
  proposedChanges:
    type: array
    minItems: 1
    items:
      type: object
      required: [file, reason, before, after]
      additionalProperties: false
      properties:
        file:
          type: string
          minLength: 1
          description: Project-relative path. Must match the repair allowlist enforced by lib/repair/proposal.mjs.
        reason:
          type: string
          minLength: 1
          maxLength: 1000
        before:
          type: string
        after:
          type: string
  requiresApproval:
    type: boolean
    const: true
  approvedAt:
    type: ["string", "null"]
    format: date-time
  appliedAt:
    type: ["string", "null"]
    format: date-time
  backupPath:
    type: ["string", "null"]
