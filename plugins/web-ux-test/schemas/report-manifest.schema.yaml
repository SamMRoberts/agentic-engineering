$schema: https://json-schema.org/draft/2020-12/schema
$id: https://github.com/SamMRoberts/agentic-engineering/plugins/web-ux-test/schemas/report-manifest.schema.yaml
title: WebUxTestReportManifest
description: Index manifest describing artifacts produced by the report generator.
type: object
required: [runId, planId, generatedAt, status, markdownPath, htmlPath]
additionalProperties: false
properties:
  runId:
    type: string
  planId:
    type: string
  generatedAt:
    type: string
    format: date-time
  status:
    type: string
    enum: [passed, failed]
  failureCategory:
    type: ["string", "null"]
    enum:
      - selector_not_found
      - timeout
      - navigation_failure
      - auth_failure
      - assertion_failure
      - network_failure
      - application_error
      - unknown
      - null
  markdownPath:
    type: string
  htmlPath:
    type: string
  finalWorkflowPhase:
    type: string
