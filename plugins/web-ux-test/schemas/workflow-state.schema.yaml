$schema: https://json-schema.org/draft/2020-12/schema
$id: https://github.com/SamMRoberts/agentic-engineering/plugins/web-ux-test/schemas/workflow-state.schema.yaml
title: WebUxTestWorkflowState
description: Persisted workflow state. Updated only via the workflow engine.
type: object
required: [version, phase, history, artifacts]
additionalProperties: false
properties:
  version:
    type: integer
    minimum: 1
    description: Schema version of the persisted state file.
  phase:
    type: string
    enum:
      - initialized
      - plan_created
      - plan_validated
      - auth_configured
      - selectors_discovered
      - test_skeleton_generated
      - test_reviewed
      - test_executed
      - failure_classified
      - repair_proposed
      - repair_approved
      - repair_applied
      - rerun_passed
      - report_generated
  planId:
    type: ["string", "null"]
  planPath:
    type: ["string", "null"]
  generatedTestPath:
    type: ["string", "null"]
  authConfigured:
    type: boolean
    default: false
  lastRunId:
    type: ["string", "null"]
  lastRunStatus:
    type: ["string", "null"]
    enum: [passed, failed, null]
  lastFailureCategory:
    type: ["string", "null"]
    enum:
      - selector_not_found
      - timeout
      - navigation_failure
      - auth_failure
      - assertion_failure
      - network_failure
      - application_error
      - unknown
      - null
  pendingRepairId:
    type: ["string", "null"]
  approvedRepairId:
    type: ["string", "null"]
  history:
    type: array
    items:
      type: object
      required: [from, to, event, at]
      additionalProperties: false
      properties:
        from:
          type: string
        to:
          type: string
        event:
          type: string
        at:
          type: string
          format: date-time
        note:
          type: string
  artifacts:
    type: object
    additionalProperties: false
    properties:
      runs:
        type: array
        items:
          type: string
      reports:
        type: array
        items:
          type: string
      repairs:
        type: array
        items:
          type: string
