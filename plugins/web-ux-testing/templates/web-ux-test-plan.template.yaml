name: example-web-ux-test-plan
version: 0.1
description: Structured web UX testing plan.
runner:
  type: playwright-mcp
  base_url: http://localhost:5173
  environment: local
  browser: chromium
  mode: headed
  viewport:
    width: 1440
    height: 900
  test_id_attribute: data-testid
scope:
  include:
    - app startup
    - navigation
    - forms
    - workflows
    - accessibility
    - responsive layout
    - error states
  exclude:
    - destructive production actions
    - external account changes
auth:
  required: false
  strategy: none
  credentials_policy: never_store_credentials
  unauthenticated_behavior: run_unauthenticated_tests_only
  verify_before_each_area: false
rules:
  do_not_modify_code: true
  report_before_fixing: true
  prefer_accessibility_snapshot: true
  prefer_test_ids: true
  capture_console_errors: true
  capture_network_failures: true
  capture_screenshots_on_failure: true
  avoid_destructive_actions: true
  avoid_infinite_exploration: true
  max_scenarios_per_area: 8
severity:
  critical: Data loss, security issue, or primary workflow impossible to complete.
  high: Primary workflow blocked or major user-facing failure.
  medium: Secondary workflow broken, confusing, or unreliable.
  low: Cosmetic, copy, spacing, or minor accessibility issue.
evidence:
  include:
    - reproduction_steps
    - expected_result
    - actual_result
    - screenshot
    - console_errors
    - network_failures
    - accessibility_snapshot
    - url
    - browser
    - viewport
test_areas:
  - name: app-startup
    goal: Validate that the app loads reliably and exposes the expected initial UI.
    priority: critical
    scenarios:
      - id: STARTUP-001
        title: Application loads from root URL
        priority: critical
        goal: Confirm the app can load without fatal frontend errors.
        entry:
          - Open the application root URL.
        checks:
          - Root route loads successfully.
          - Page is not blank.
          - No uncaught runtime errors appear.
          - Required API calls succeed or fail gracefully.
        issue_indicators:
          - Blank screen.
          - Infinite loading spinner.
          - Unhandled exception.
          - Failed required API request.
        evidence:
          - screenshot
          - console_errors
          - network_failures
          - url
        stop_conditions:
          - Critical startup failure prevents further testing.
        convert_to_regression_test: true
