id: ARIA-LIVE-001
title: Status, loading, and validation messages are announced through accessible status regions
priority: medium
goal: Verify that asynchronous UX changes expose status updates to assistive technologies without excessive noise.
entry:
  - Open a workflow with loading, saving, validation, or async status feedback.
steps:
  - Trigger an async action such as save, search, submit, or load more.
  - Inspect status, alert, progressbar, or live-region semantics.
  - Verify success and failure messages are discoverable.
checks:
  - Loading or saving state has a discoverable status when it affects the workflow.
  - Error states use alert-like semantics when appropriate.
  - Success confirmation is visible and accessible.
  - Status messages do not repeatedly spam users for minor updates.
issue_indicators:
  - Loading status is visual-only.
  - Error message is not represented in the accessibility tree.
  - Success/failure feedback disappears too quickly.
  - Live region announces excessive or misleading content.
evidence:
  - accessibility_snapshot
  - aria_snapshot
  - screenshot
  - console_errors
  - network_failures
convert_to_regression_test: false
aria:
  snapshot_scope: locator
  baseline_name: status-region.aria.yml
  dynamic_content_policy: regex
  recommended_assertion: 'expect(statusRegion).toMatchAriaSnapshot({ name: "status-region.aria.yml" })'
