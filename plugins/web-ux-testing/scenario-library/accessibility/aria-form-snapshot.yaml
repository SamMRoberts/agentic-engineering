id: ARIA-FORM-001
title: Form fields and validation are represented correctly in the accessibility tree
priority: high
goal: Verify that form controls, labels, required states, invalid states, and validation messages are exposed correctly.
entry:
  - Open a page containing a primary form.
steps:
  - Capture an ARIA snapshot of the form before submission.
  - Submit with required fields empty.
  - Capture an ARIA snapshot of the validation state.
  - Fill fields with valid data and verify validation messages clear.
checks:
  - Each field has a programmatic accessible name.
  - Required fields are exposed as required or clearly described.
  - Invalid fields expose invalid state or are associated with visible error messages.
  - Error messages are reachable to assistive technologies.
  - Submit button state is exposed during pending submission.
issue_indicators:
  - Input exists without a label or accessible name.
  - Error text is visible but not associated with the field.
  - Required or invalid state is missing.
  - Submit state is visually disabled but not semantically disabled.
  - ARIA snapshot contains raw backend errors or private data.
evidence:
  - aria_snapshot
  - accessibility_snapshot
  - screenshot
  - console_errors
  - network_failures
convert_to_regression_test: true
aria:
  snapshot_scope: locator
  baseline_name: form-validation.aria.yml
  dynamic_content_policy: regex
  recommended_assertion: 'expect(form).toMatchAriaSnapshot({ name: "form-validation.aria.yml" })'
