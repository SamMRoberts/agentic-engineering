id: A11Y-KEYBOARD-001
title: Core workflows are usable with keyboard only
goal: Validate keyboard navigation through primary controls and workflows.
priority: high
entry:
  - Open the application root URL.
steps:
  - Navigate using Tab and Shift+Tab.
  - Activate controls using Enter and Space.
  - Close menus or dialogs using Escape when applicable.
checks:
  - Focus indicator is visible.
  - Focus order is logical.
  - Interactive controls are reachable.
  - Keyboard users are not trapped.
issue_indicators:
  - Invisible focus.
  - Keyboard trap.
  - Unreachable control.
  - Enter or Space does not activate expected control.
evidence: [screenshot, accessibility_snapshot]
convert_to_regression_test: true
