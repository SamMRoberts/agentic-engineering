id: LOADING-STATE-001
title: Loading states resolve or provide recovery
goal: Validate asynchronous loading behavior is understandable and not indefinite.
priority: medium
entry:
  - Open a page that loads data asynchronously.
steps:
  - Observe initial loading state.
  - Wait for loaded, empty, or error state.
checks:
  - Loading state is visible when data is pending.
  - Loading state resolves to content, empty state, or error state.
  - Long-running loading provides useful feedback or recovery.
issue_indicators:
  - Infinite spinner.
  - Layout shifts excessively after loading.
  - No distinction between loading and empty state.
evidence: [screenshot, console_errors, network_failures]
convert_to_regression_test: true
