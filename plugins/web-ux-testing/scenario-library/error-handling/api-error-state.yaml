id: ERROR-API-001
title: API failures produce clear user-facing errors
goal: Verify API-backed pages fail gracefully when required requests fail.
priority: high
entry:
  - Open a page that depends on API data.
steps:
  - Observe behavior when API requests fail naturally or are simulated by the environment.
  - Retry the operation when a retry path exists.
checks:
  - User sees a clear error message.
  - App does not show a blank page.
  - Retry or recovery path is available when appropriate.
  - Failed network requests are captured as evidence.
issue_indicators:
  - Raw API error displayed.
  - Infinite spinner after failed request.
  - Page silently omits required data.
  - Retry button does nothing.
evidence: [screenshot, console_errors, network_failures, url]
convert_to_regression_test: true
