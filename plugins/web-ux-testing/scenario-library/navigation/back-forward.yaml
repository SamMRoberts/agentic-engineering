id: NAV-HISTORY-001
title: Browser back and forward behave predictably
goal: Validate that browser history works for key routes and UI state.
priority: medium
entry:
  - Start on the application root URL.
steps:
  - Navigate through at least three primary routes.
  - Use browser Back twice.
  - Use browser Forward twice.
checks:
  - URL and visible page content stay in sync.
  - App does not show stale route state.
  - No modal or loading state traps navigation.
issue_indicators:
  - Back button exits app unexpectedly.
  - URL changes but page content does not.
  - App gets stuck loading after back/forward.
evidence: [screenshot, url, console_errors, network_failures]
convert_to_regression_test: true
