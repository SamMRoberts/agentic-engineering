scenarios:
  - id: authentication.pass-through
    title: Authentication pass-through
    file: authentication/pass-through.yaml
    applies_when:
      - auth.required == true
    tags: [auth, session, reload]
    priority: high

  - id: authentication.manual-login-pause
    title: Manual login pause
    file: authentication/manual-login-pause.yaml
    applies_when:
      - auth.strategy == "manual_login_pause"
      - auth.strategy == "saved_browser_session"
    tags: [auth, manual-login, mcp]
    priority: high

  - id: authentication.expired-session
    title: Expired session handling
    file: authentication/expired-session.yaml
    applies_when:
      - auth.required == true
    tags: [auth, session, error-state]
    priority: high

  - id: authentication.logout-clears-session
    title: Logout clears session
    file: authentication/logout-clears-session.yaml
    applies_when:
      - auth.required == true
    tags: [auth, logout, session]
    priority: high

  - id: forms.input-validation
    title: Input field validation
    file: forms/input-validation.yaml
    applies_when:
      - forms.present == true
    tags: [forms, validation, accessibility]
    priority: high

  - id: forms.duplicate-submit
    title: Duplicate submit prevention
    file: forms/duplicate-submit.yaml
    applies_when:
      - forms.present == true
    tags: [forms, submit, data-integrity]
    priority: high

  - id: forms.required-fields
    title: Required field validation
    file: forms/required-fields.yaml
    applies_when:
      - forms.present == true
    tags: [forms, validation]
    priority: high

  - id: navigation.main-navigation
    title: Main navigation
    file: navigation/main-navigation.yaml
    applies_when:
      - navigation.present == true
    tags: [navigation, routes]
    priority: high

  - id: navigation.back-forward
    title: Browser back and forward
    file: navigation/back-forward.yaml
    applies_when:
      - navigation.present == true
    tags: [navigation, browser-history]
    priority: medium

  - id: navigation.deep-linking
    title: Deep linking
    file: navigation/deep-linking.yaml
    applies_when:
      - routes.deep_links == true
    tags: [navigation, routing]
    priority: medium

  - id: state-recovery.reload
    title: Reload recovery
    file: state-recovery/reload.yaml
    applies_when:
      - runner.type in ["playwright-mcp", "hybrid", "agent-built-in-browser"]
    tags: [reload, recovery]
    priority: high

  - id: state-recovery.hard-refresh
    title: Hard refresh recovery
    file: state-recovery/hard-refresh.yaml
    applies_when:
      - runner.type in ["playwright-mcp", "hybrid"]
    tags: [reload, cache, recovery]
    priority: medium

  - id: state-recovery.clear-cache
    title: Clear cache recovery
    file: state-recovery/clear-cache.yaml
    applies_when:
      - runner.type in ["playwright-mcp", "hybrid"]
    tags: [cache, storage, recovery]
    priority: medium

  - id: state-recovery.stale-storage
    title: Stale storage recovery
    file: state-recovery/stale-storage.yaml
    applies_when:
      - app.uses_local_storage == true
    tags: [storage, recovery]
    priority: medium

  - id: accessibility.keyboard-navigation
    title: Keyboard navigation
    file: accessibility/keyboard-navigation.yaml
    applies_when:
      - accessibility.enabled == true
    tags: [accessibility, keyboard, focus]
    priority: high

  - id: accessibility.accessible-names
    title: Accessible names
    file: accessibility/accessible-names.yaml
    applies_when:
      - accessibility.enabled == true
    tags: [accessibility, labels]
    priority: high

  - id: accessibility.focus-management
    title: Focus management
    file: accessibility/focus-management.yaml
    applies_when:
      - accessibility.enabled == true
    tags: [accessibility, focus, modal]
    priority: high

  - id: responsive.mobile-layout
    title: Mobile layout
    file: responsive/mobile-layout.yaml
    applies_when:
      - responsive.mobile == true
    tags: [responsive, mobile]
    priority: medium

  - id: responsive.tablet-layout
    title: Tablet layout
    file: responsive/tablet-layout.yaml
    applies_when:
      - responsive.tablet == true
    tags: [responsive, tablet]
    priority: medium

  - id: responsive.desktop-layout
    title: Desktop layout
    file: responsive/desktop-layout.yaml
    applies_when:
      - responsive.desktop == true
    tags: [responsive, desktop]
    priority: medium

  - id: error-handling.api-error-state
    title: API error state
    file: error-handling/api-error-state.yaml
    applies_when:
      - api.present == true
    tags: [api, error-state, network]
    priority: high

  - id: error-handling.empty-state
    title: Empty state
    file: error-handling/empty-state.yaml
    applies_when:
      - data.empty_states == true
    tags: [empty-state, content]
    priority: medium

  - id: error-handling.loading-state
    title: Loading state
    file: error-handling/loading-state.yaml
    applies_when:
      - async_loading == true
    tags: [loading, async]
    priority: medium


  - id: accessibility.aria-page-snapshot
    title: ARIA page snapshot
    file: accessibility/aria-page-snapshot.yaml
    applies_when:
      - accessibility.enabled == true
      - aria.enabled == true
    tags: [accessibility, aria, snapshot, playwright]
    priority: high

  - id: accessibility.aria-component-snapshot
    title: ARIA component snapshot
    file: accessibility/aria-component-snapshot.yaml
    applies_when:
      - accessibility.enabled == true
      - aria.enabled == true
    tags: [accessibility, aria, component, snapshot]
    priority: high

  - id: accessibility.aria-form-snapshot
    title: ARIA form snapshot
    file: accessibility/aria-form-snapshot.yaml
    applies_when:
      - accessibility.enabled == true
      - forms.present == true
    tags: [accessibility, aria, forms, validation]
    priority: high

  - id: accessibility.aria-dialog-snapshot
    title: ARIA dialog snapshot
    file: accessibility/aria-dialog-snapshot.yaml
    applies_when:
      - accessibility.enabled == true
      - dialogs.present == true
    tags: [accessibility, aria, dialog, focus]
    priority: high

  - id: accessibility.aria-live-region
    title: ARIA live region and status validation
    file: accessibility/aria-live-region.yaml
    applies_when:
      - accessibility.enabled == true
      - async_loading == true
    tags: [accessibility, aria, status, loading, error-state]
    priority: medium
