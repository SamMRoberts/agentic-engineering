id: AUTH-EXPIRED-SESSION-001
title: Expired session is handled clearly
goal: Verify that expired or invalid sessions produce a clear recovery path.
priority: high
entry:
  - Start with an expired or invalid saved session when available.
steps:
  - Open a protected route.
  - Observe redirect or error behavior.
  - Attempt to recover by signing in again manually if needed.
checks:
  - User is redirected to login or shown a clear session-expired message.
  - Protected content is not exposed after session expiration.
  - User can recover without clearing browser data manually.
issue_indicators:
  - Redirect loop.
  - Blank page after session expiration.
  - Protected content flashes or remains visible.
  - Raw 401/403 error is shown without guidance.
evidence: [screenshot, url, console_errors, network_failures]
convert_to_regression_test: true
