id: FORM-INPUT-001
title: Input fields handle valid, invalid, empty, and edge-case values
priority: high
goal: Validate that form fields provide clear feedback and prevent invalid submissions.
entry:
  - Open a page containing a primary user input form.
steps:
  - Submit the form with all fields empty.
  - Enter valid values.
  - Enter invalid values.
  - Enter leading and trailing spaces.
  - Enter very long text.
  - Enter special characters.
  - Use keyboard-only navigation through the form.
  - Submit the form once with valid data.
checks:
  - Required fields are clearly marked.
  - Validation messages appear near the relevant field.
  - Validation messages are understandable.
  - Invalid submit is blocked.
  - Valid submit succeeds.
  - Submit button prevents accidental duplicate submissions.
  - Keyboard focus moves logically.
  - Screen-reader-friendly labels or accessible names exist.
issue_indicators:
  - Silent validation failure.
  - Raw backend error shown to user.
  - Duplicate records created.
  - Field accepts invalid values without feedback.
  - Required field is not announced or labeled.
  - Error message disappears before the user can read it.
  - Submit remains enabled during pending request.
evidence: [screenshot, accessibility_snapshot, console_errors, network_failures]
convert_to_regression_test: true
