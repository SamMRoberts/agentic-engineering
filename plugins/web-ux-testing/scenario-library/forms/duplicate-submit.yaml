id: FORM-DUPLICATE-SUBMIT-001
title: Duplicate submit is prevented
goal: Verify users cannot accidentally submit the same operation multiple times.
priority: high
entry:
  - Open a form that creates or updates data.
steps:
  - Fill the form with valid data.
  - Submit the form.
  - Attempt to submit again while the request is pending.
checks:
  - Submit control is disabled or guarded during pending request.
  - Only one user-visible record or operation is created.
  - User receives clear success or failure feedback.
issue_indicators:
  - Duplicate records are created.
  - Multiple identical network requests are sent.
  - Submit button remains enabled during pending state.
evidence: [screenshot, console_errors, network_failures]
convert_to_regression_test: true
