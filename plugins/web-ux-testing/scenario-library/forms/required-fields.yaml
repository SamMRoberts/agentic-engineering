id: FORM-REQUIRED-FIELDS-001
title: Required fields provide clear validation
goal: Verify required fields are visible, understandable, and enforce validation.
priority: high
entry:
  - Open a form with required fields.
steps:
  - Submit with required fields empty.
  - Fill one required field at a time.
  - Submit again after all required fields are valid.
checks:
  - Required fields are visually identifiable.
  - Field-level errors appear near the relevant fields.
  - Errors clear when values become valid.
  - Valid submission succeeds.
issue_indicators:
  - Required field missing indication.
  - Error appears only at page top without field context.
  - Form submits with missing required data.
evidence: [screenshot, accessibility_snapshot, console_errors, network_failures]
convert_to_regression_test: true
