id: RESPONSIVE-TABLET-001
title: Tablet layout remains usable
goal: Validate important pages at a tablet viewport.
priority: medium
entry:
  - Open the application with a tablet viewport.
steps:
  - Navigate main pages.
  - Inspect dense UI areas such as tables, panels, and forms.
checks:
  - Layout adapts without clipping or overlap.
  - Navigation and controls remain reachable.
  - Tables or cards remain readable.
issue_indicators:
  - Panels overlap.
  - Important actions disappear.
  - Text is truncated without access to full value.
evidence: [screenshot, url, console_errors]
convert_to_regression_test: false
