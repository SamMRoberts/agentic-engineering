name: missing-stop-conditions-plan
version: "0.1"
runner:
  type: playwright-mcp
  base_url: http://localhost:5173
scope:
  include:
    - keyboard navigation
  exclude:
    - destructive production actions
auth:
  required: false
  strategy: none
  credentials_policy: never_store_credentials
rules:
  prefer_accessibility_snapshot: true
  capture_console_errors: true
  capture_network_failures: true
  avoid_destructive_actions: true
severity:
  critical: Primary workflow impossible to complete.
  high: Primary workflow blocked.
  medium: Secondary workflow broken.
  low: Minor issue.
evidence:
  include:
    - console_errors
    - network_failures
    - accessibility_snapshot
test_areas:
  - name: navigation
    goal: Validate primary navigation.
    priority: high
    scenarios:
      - id: NAV-001
        title: Primary navigation works from the app shell
        priority: high
        goal: Confirm primary navigation links expose accessible names.
        entry:
          - Navigate to /.
        steps:
          - Open the primary navigation.
        checks:
          - Navigation links are reachable by keyboard.
        issue_indicators:
          - Links are missing accessible names.
        evidence:
          - console_errors
          - network_failures
          - accessibility_snapshot