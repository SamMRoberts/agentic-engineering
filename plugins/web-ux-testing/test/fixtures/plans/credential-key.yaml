name: credential-key-plan
version: "0.1"
runner:
  type: playwright-mcp
  base_url: http://localhost:5173
scope:
  include:
    - login
  exclude:
    - destructive production actions
auth:
  required: true
  strategy: manual_login_pause
  credentials_policy: never_store_credentials
  password: do-not-store-this
rules:
  prefer_accessibility_snapshot: true
  capture_console_errors: true
  capture_network_failures: true
  avoid_destructive_actions: true
severity:
  critical: Primary workflow impossible to complete.
  high: Primary workflow blocked.
  medium: Secondary workflow broken.
  low: Minor issue.
evidence:
  include:
    - console_errors
    - network_failures
    - accessibility_snapshot
test_areas:
  - name: authentication
    goal: Validate login screen behavior.
    priority: high
    scenarios:
      - id: AUTH-001
        title: Login requires manual user action
        priority: high
        goal: Confirm the login screen does not expose credential material.
        entry:
          - Navigate to /login.
        steps:
          - Pause for manual login.
        checks:
          - Manual login can continue without storing credentials.
        issue_indicators:
          - Credentials appear in the plan or output.
        evidence:
          - console_errors
          - network_failures
          - accessibility_snapshot
        stop_conditions:
          - Stop if credentials are requested in chat or stored in YAML.