name: duplicate-scenario-id-plan
version: "0.1"
runner:
  type: playwright-mcp
  base_url: http://localhost:5173
scope:
  include:
    - keyboard navigation
    - accessibility
  exclude:
    - destructive production actions
auth:
  required: false
  strategy: none
  credentials_policy: never_store_credentials
rules:
  prefer_accessibility_snapshot: true
  capture_console_errors: true
  capture_network_failures: true
  avoid_destructive_actions: true
severity:
  critical: Primary workflow impossible to complete.
  high: Primary workflow blocked.
  medium: Secondary workflow broken.
  low: Minor issue.
evidence:
  include:
    - console_errors
    - network_failures
    - accessibility_snapshot
test_areas:
  - name: navigation
    goal: Validate primary navigation.
    priority: high
    scenarios:
      - id: DUP-001
        title: First scenario
        priority: high
        goal: Confirm navigation is keyboard reachable.
        entry:
          - Navigate to /.
        steps:
          - Tab through navigation.
        checks:
          - Navigation links receive focus.
        issue_indicators:
          - Navigation cannot be reached by keyboard.
        evidence:
          - console_errors
          - network_failures
          - accessibility_snapshot
        stop_conditions:
          - Stop when navigation cannot be reached.
  - name: accessibility
    goal: Validate semantic structure.
    priority: high
    scenarios:
      - id: DUP-001
        title: Second scenario with reused id
        priority: medium
        goal: Confirm page landmarks are present.
        entry:
          - Navigate to /.
        steps:
          - Inspect the accessibility snapshot.
        checks:
          - Main landmark is present.
        issue_indicators:
          - Main landmark is missing.
        evidence:
          - console_errors
          - network_failures
          - accessibility_snapshot
        stop_conditions:
          - Stop when the page shell cannot load.