name: sample-web-ux-test-plan
version: "0.1"
description: Strict validation fixture for a safe exploratory plan.
runner:
  type: hybrid
  base_url: http://localhost:5173
  environment: local
  browser: chromium
  mode: headed
  viewport:
    width: 1440
    height: 900
  test_id_attribute: data-testid
scope:
  include:
    - app startup
    - keyboard navigation
    - checkout form validation
  exclude:
    - destructive production actions
    - external account changes
auth:
  required: false
  strategy: none
  credentials_policy: never_store_credentials
  unauthenticated_behavior: run_unauthenticated_tests_only
  verify_before_each_area: false
rules:
  do_not_modify_code: true
  report_before_fixing: true
  prefer_accessibility_snapshot: true
  prefer_test_ids: true
  capture_console_errors: true
  capture_network_failures: true
  capture_screenshots_on_failure: true
  avoid_destructive_actions: true
  avoid_infinite_exploration: true
  max_scenarios_per_area: 8
severity:
  critical: Data loss, security issue, or primary workflow impossible to complete.
  high: Primary workflow blocked or major user-facing failure.
  medium: Secondary workflow broken, confusing, or unreliable.
  low: Cosmetic, copy, spacing, or minor accessibility issue.
evidence:
  include:
    - reproduction_steps
    - expected_result
    - actual_result
    - screenshot
    - console_errors
    - network_failures
    - accessibility_snapshot
    - url
    - browser
    - viewport
test_areas:
  - name: forms
    goal: Validate critical form behavior with accessible selectors and observable evidence.
    priority: high
    scenarios:
      - id: FORM-001
        title: Checkout validation shows accessible errors
        priority: high
        goal: Confirm required checkout fields provide accessible validation feedback.
        entry:
          - Navigate to /checkout.
          - Capture an accessibility snapshot before interacting.
        steps:
          - Submit the checkout form with required fields empty.
          - Fill the email field with an invalid address.
        branches:
          - condition: Required field errors appear after submit.
            signals:
              - Alert or inline error text is visible.
            actions:
              - Inspect each invalid field by label.
            checks:
              - Each invalid field exposes an accessible error message.
            failure_handling:
              - Capture screenshot, console_errors, and network_failures before stopping the scenario.
        checks:
          - Required field errors are visible and associated with inputs.
          - Keyboard focus remains inside the form after validation.
          - No console_errors or network_failures appear during validation.
        issue_indicators:
          - Validation text is missing or not announced.
          - Focus moves unexpectedly after submit.
          - Console errors occur during form validation.
        evidence:
          - screenshot
          - console_errors
          - network_failures
          - accessibility_snapshot
        stop_conditions:
          - Stop if validation submits real payment or mutates production data.
        convert_to_regression_test: true