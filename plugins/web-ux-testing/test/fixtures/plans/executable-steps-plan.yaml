name: executable-steps-plan
version: "0.1"
description: Fixture for compiling user-defined executable steps into Playwright tests.
runner:
  type: playwright-cli
  base_url: http://localhost:5173
  environment: local
  browser: chromium
  mode: headless
  test_id_attribute: data-testid
scope:
  include:
    - checkout form validation
    - keyboard accessibility
  exclude:
    - destructive production actions
auth:
  required: false
  strategy: none
  credentials_policy: never_store_credentials
  unauthenticated_behavior: run_unauthenticated_tests_only
rules:
  do_not_modify_code: true
  prefer_accessibility_snapshot: true
  prefer_test_ids: true
  capture_console_errors: true
  capture_network_failures: true
  capture_screenshots_on_failure: true
  avoid_destructive_actions: true
  avoid_infinite_exploration: true
severity:
  critical: Primary workflow impossible to complete.
  high: Primary workflow blocked.
  medium: Secondary workflow broken.
  low: Minor issue.
evidence:
  include:
    - console_errors
    - network_failures
    - accessibility_snapshot
test_areas:
  - name: forms
    goal: Compile stable form steps into a deterministic regression test.
    priority: high
    scenarios:
      - id: FORM-EXEC-001
        title: Checkout email validation
        priority: high
        goal: Confirm invalid email feedback is visible.
        entry:
          - Start from the checkout page.
        executable_steps:
          - action: navigate
            path: /checkout
          - action: fill
            locator:
              strategy: label
              value: Email
            value: not-an-email
          - action: click
            locator:
              strategy: role
              role: button
              name: Continue
          - action: assert_visible
            locator:
              strategy: text
              value: Enter a valid email address
        checks:
          - Invalid email feedback is visible.
          - No console_errors or network_failures occur during validation.
        issue_indicators:
          - Invalid email feedback is missing.
          - Submit proceeds with invalid email.
        evidence:
          - console_errors
          - network_failures
          - accessibility_snapshot
        stop_conditions:
          - Stop if checkout attempts a real payment or destructive action.
        convert_to_regression_test: true