$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://example.com/schemas/web-ux-finding.schema.yaml"
title: "Web UX Finding"
type: object
required:
  - id
  - scenario_id
  - severity
  - title
  - status
  - environment
  - runner
  - reproduction_steps
  - expected_result
  - actual_result
properties:
  id:
    type: string
  scenario_id:
    type: string
  severity:
    type: string
    enum: [critical, high, medium, low]
  title:
    type: string
  status:
    type: string
    enum: [open, needs_triage, confirmed, fixed, rejected]
  environment:
    type: string
  runner:
    type: string
    enum: [playwright-mcp, agent-built-in-browser, playwright-cli, hybrid]
  reproduction_steps:
    type: array
    items: { type: string }
  expected_result:
    type: string
  actual_result:
    type: string
  evidence:
    type: object
    properties:
      screenshots:
        type: array
        items: { type: string }
      console_errors:
        type: array
        items: { type: string }
      network_failures:
        type: array
        items: { type: string }
      urls:
        type: array
        items: { type: string }
      aria_snapshots:
        type: array
        items:
          type: string
      accessibility_snapshots:
        type: array
        items: { type: string }
  suspected_area:
    type: array
    items: { type: string }
  recommended_next_step:
    type: string
  convert_to_regression_test:
    type: boolean
