$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://example.com/schemas/web-ux-test-plan.schema.yaml"
title: "Web UX Test Plan"
type: object
additionalProperties: false
required:
  - name
  - version
  - runner
  - scope
  - auth
  - rules
  - severity
  - test_areas
properties:
  name:
    type: string
  version:
    type: string
  description:
    type: string
  runner:
    type: object
    additionalProperties: false
    required:
      - type
      - base_url
    properties:
      type:
        type: string
        enum: [playwright-mcp, agent-built-in-browser, playwright-cli, hybrid]
      base_url:
        type: string
      environment:
        type: string
      browser:
        type: string
        enum: [chromium, chrome, firefox, webkit, msedge]
      mode:
        type: string
        enum: [headed, headless]
      viewport:
        type: object
        additionalProperties: false
        required: [width, height]
        properties:
          width:
            type: integer
          height:
            type: integer
      test_id_attribute:
        type: string
        default: data-testid
  scope:
    type: object
    additionalProperties: false
    required: [include, exclude]
    properties:
      include:
        type: array
        minItems: 1
        items: { type: string }
      exclude:
        type: array
        minItems: 1
        items: { type: string }
  auth:
    type: object
    additionalProperties: false
    required: [required, strategy, credentials_policy]
    properties:
      required:
        type: boolean
      strategy:
        type: string
        enum: [none, saved_browser_session, manual_login_pause, test_user, programmatic_login, mocked_auth, dev_auth_bypass]
      credentials_policy:
        type: string
        enum: [never_store_credentials, use_environment_variables, use_secret_manager]
      unauthenticated_behavior:
        type: string
        enum: [pause_for_manual_login, stop_and_report, run_unauthenticated_tests_only]
      verify_before_each_area:
        type: boolean
  rules:
    type: object
    additionalProperties: false
    properties:
      do_not_modify_code: { type: boolean }
      report_before_fixing: { type: boolean }
      prefer_accessibility_snapshot: { type: boolean }
      prefer_aria_snapshots: { type: boolean }
      prefer_test_ids: { type: boolean }
      capture_console_errors: { type: boolean }
      capture_network_failures: { type: boolean }
      capture_screenshots_on_failure: { type: boolean }
      avoid_destructive_actions: { type: boolean }
      avoid_infinite_exploration: { type: boolean }
      max_scenarios_per_area: { type: integer }
  severity:
    type: object
    additionalProperties: false
    required: [critical, high, medium, low]
    properties:
      critical: { type: string }
      high: { type: string }
      medium: { type: string }
      low: { type: string }
  evidence:
    type: object
    additionalProperties: false
    properties:
      include:
        type: array
        minItems: 1
        items:
          type: string
          enum: [reproduction_steps, expected_result, actual_result, screenshot, console_errors, network_failures, accessibility_snapshot, aria_snapshot, url, browser, viewport, timestamp]
  test_areas:
    type: array
    items:
      $ref: "#/$defs/test_area"
$defs:
  test_area:
    type: object
    additionalProperties: false
    required: [name, goal, priority, scenarios]
    properties:
      name: { type: string }
      goal: { type: string }
      priority:
        type: string
        enum: [critical, high, medium, low]
      scenarios:
        type: array
        minItems: 1
        items:
          $ref: "#/$defs/scenario"
  scenario:
    type: object
    additionalProperties: false
    required: [id, title, priority, goal, entry, checks, issue_indicators, evidence, stop_conditions]
    anyOf:
      - required: [steps]
      - required: [branches]
      - required: [executable_steps]
    properties:
      id: { type: string }
      title: { type: string }
      priority:
        type: string
        enum: [critical, high, medium, low]
      goal: { type: string }
      entry:
        type: array
        minItems: 1
        items: { type: string }
      steps:
        type: array
        minItems: 1
        items: { type: string }
      branches:
        type: array
        minItems: 1
        items:
          $ref: "#/$defs/branch"
      executable_steps:
        type: array
        minItems: 1
        items:
          $ref: "#/$defs/executable_step"
      checks:
        type: array
        minItems: 1
        items: { type: string }
      issue_indicators:
        type: array
        minItems: 1
        items: { type: string }
      evidence:
        type: array
        minItems: 1
        items: { type: string }
      stop_conditions:
        type: array
        minItems: 1
        items: { type: string }
      convert_to_regression_test:
        type: boolean
      aria:
        type: object
        additionalProperties: false
        properties:
          snapshot_scope:
            type: string
            enum: [page, locator, region]
          baseline_name:
            type: string
          dynamic_content_policy:
            type: string
            enum: [none, regex, mask, omit, avoid_snapshot]
          recommended_assertion:
            type: string
  branch:
    type: object
    additionalProperties: false
    required: [condition, signals, actions, checks]
    properties:
      condition: { type: string }
      optional: { type: boolean }
      signals:
        type: array
        minItems: 1
        items: { type: string }
      actions:
        type: array
        minItems: 1
        items: { type: string }
      checks:
        type: array
        minItems: 1
        items: { type: string }
      failure_handling:
        type: array
        minItems: 1
        items: { type: string }
  executable_step:
    type: object
    additionalProperties: false
    required: [action]
    properties:
      action:
        type: string
        enum: [navigate, click, fill, select, press, assert_visible, assert_text, assert_url, capture_evidence]
      path:
        type: string
      locator:
        $ref: "#/$defs/locator"
      value:
        type: string
      key:
        type: string
      expected:
        type: string
      note:
        type: string
    allOf:
      - if:
          properties:
            action: { const: navigate }
        then:
          required: [path]
      - if:
          properties:
            action: { enum: [click, assert_visible] }
        then:
          required: [locator]
      - if:
          properties:
            action: { enum: [fill, select] }
        then:
          required: [locator, value]
      - if:
          properties:
            action: { const: press }
        then:
          required: [locator, key]
      - if:
          properties:
            action: { const: assert_text }
        then:
          required: [locator, expected]
      - if:
          properties:
            action: { const: assert_url }
        then:
          required: [expected]
  locator:
    type: object
    additionalProperties: false
    required: [strategy]
    properties:
      strategy:
        type: string
        enum: [role, label, text, test_id, placeholder, css]
      value:
        type: string
      role:
        type: string
      name:
        type: string
    allOf:
      - if:
          properties:
            strategy: { const: role }
        then:
          required: [role]
      - if:
          properties:
            strategy: { enum: [label, text, test_id, placeholder, css] }
        then:
          required: [value]
