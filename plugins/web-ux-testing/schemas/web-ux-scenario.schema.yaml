$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://example.com/schemas/web-ux-scenario.schema.yaml"
title: "Web UX Scenario"
type: object
required: [id, title, priority, goal, entry, checks, issue_indicators]
properties:
  id:
    type: string
  title:
    type: string
  priority:
    type: string
    enum: [critical, high, medium, low]
  goal:
    type: string
  entry:
    type: array
    items: { type: string }
  steps:
    type: array
    items: { type: string }
  branches:
    type: array
    items:
      type: object
      required: [condition, signals, actions, checks]
      properties:
        condition: { type: string }
        optional: { type: boolean }
        signals:
          type: array
          items: { type: string }
        actions:
          type: array
          items: { type: string }
        checks:
          type: array
          items: { type: string }
        failure_handling:
          type: array
          items: { type: string }
  checks:
    type: array
    items: { type: string }
  issue_indicators:
    type: array
    items: { type: string }
  evidence:
    type: array
    items: { type: string }
  stop_conditions:
    type: array
    items: { type: string }
  convert_to_regression_test:
    type: boolean
  aria:
    type: object
    properties:
      snapshot_scope:
        type: string
        enum: [page, locator, region]
      baseline_name:
        type: string
      dynamic_content_policy:
        type: string
        enum: [none, regex, mask, omit, avoid_snapshot]
      recommended_assertion:
        type: string
