$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://example.com/schemas/web-ux-scenario.schema.yaml"
title: "Web UX Scenario"
type: object
additionalProperties: false
required: [id, title, priority, goal, entry, checks, issue_indicators, evidence, stop_conditions]
anyOf:
  - required: [steps]
  - required: [branches]
  - required: [executable_steps]
properties:
  id:
    type: string
  title:
    type: string
  priority:
    type: string
    enum: [critical, high, medium, low]
  goal:
    type: string
  entry:
    type: array
    minItems: 1
    items: { type: string }
  steps:
    type: array
    minItems: 1
    items: { type: string }
  branches:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [condition, signals, actions, checks]
      properties:
        condition: { type: string }
        optional: { type: boolean }
        signals:
          type: array
          minItems: 1
          items: { type: string }
        actions:
          type: array
          minItems: 1
          items: { type: string }
        checks:
          type: array
          minItems: 1
          items: { type: string }
        failure_handling:
          type: array
          minItems: 1
          items: { type: string }
  executable_steps:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [action]
      properties:
        action:
          type: string
          enum: [navigate, click, fill, select, press, assert_visible, assert_text, assert_url, capture_evidence]
        path:
          type: string
        locator:
          type: object
          additionalProperties: false
          required: [strategy]
          properties:
            strategy:
              type: string
              enum: [role, label, text, test_id, placeholder, css]
            value:
              type: string
            role:
              type: string
            name:
              type: string
        value:
          type: string
        key:
          type: string
        expected:
          type: string
        note:
          type: string
  checks:
    type: array
    minItems: 1
    items: { type: string }
  issue_indicators:
    type: array
    minItems: 1
    items: { type: string }
  evidence:
    type: array
    minItems: 1
    items: { type: string }
  stop_conditions:
    type: array
    minItems: 1
    items: { type: string }
  convert_to_regression_test:
    type: boolean
  aria:
    type: object
    additionalProperties: false
    properties:
      snapshot_scope:
        type: string
        enum: [page, locator, region]
      baseline_name:
        type: string
      dynamic_content_policy:
        type: string
        enum: [none, regex, mask, omit, avoid_snapshot]
      recommended_assertion:
        type: string
