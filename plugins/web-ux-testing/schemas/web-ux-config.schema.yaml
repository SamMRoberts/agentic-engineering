$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://example.com/schemas/web-ux-config.schema.yaml"
title: "Web UX Test Config"
type: object
required: [runner, auth, rules]
properties:
  runner:
    type: object
    required: [type, base_url]
    properties:
      type:
        type: string
        enum: [playwright-mcp, agent-built-in-browser, playwright-cli, hybrid]
      base_url:
        type: string
      environment:
        type: string
      browser:
        type: string
      mode:
        type: string
      test_id_attribute:
        type: string
  auth:
    type: object
    required: [required, strategy, credentials_policy]
    properties:
      required:
        type: boolean
      strategy:
        type: string
      credentials_policy:
        type: string
      unauthenticated_behavior:
        type: string
  rules:
    type: object
