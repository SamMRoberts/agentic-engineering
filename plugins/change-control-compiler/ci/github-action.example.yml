name: Change Control Contract

on:
  pull_request:
    paths:
      - ".agent/session/change-control-contract.json"
      - "**"

jobs:
  change-control:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate Change Control Contract
        run: node skills/change-control-compiler/scripts/change-control.mjs check
      - name: Check Change Drift
        run: node skills/change-control-compiler/scripts/change-control.mjs drift
