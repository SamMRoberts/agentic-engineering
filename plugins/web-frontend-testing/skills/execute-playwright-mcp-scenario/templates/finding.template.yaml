# Canonical finding shape emitted by execute-playwright-mcp-scenario.
# Findings are appended to <report_dir>/findings/<scenario-id>.yaml as a list.

id: <scenario-id>-<step-index>
scenario_id: <scenario-id>
severity: medium # critical | high | medium | low | info
category: functional # functional | accessibility | performance | console | network | visual | security
summary: <one sentence describing the issue>
observed: <what actually happened>
expected: <what the scenario predicted>
evidence:
  snapshot_ref: <path or inline reference>
  console:
    - <message>
  network:
    - <method url status>
  screenshot: <path or null>
reproduction:
  url: <url at time of failure>
  steps:
    - <short reproduction step>
suggested_fix: <optional hypothesis>
