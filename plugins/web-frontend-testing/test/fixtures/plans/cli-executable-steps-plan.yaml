plan_version: 1
target:
  url: https://example.com
  stage: local
  auth_strategy: none
runner: playwright-cli
cli_session:
  show_cli_session: false
  project: chromium
safety:
  destructive_actions_allowed: false
  forbidden_selectors: []
  forbidden_urls: []
scope:
  in_scope: [checkout]
  out_of_scope: [admin]
scenarios:
  - id: checkout-email-validation
    title: Checkout email validation
    priority: P2
    surface: form
    steps:
      - action: navigate
        target: /checkout
        expect: Checkout form visible
    success_criteria: [invalid email rejected]
    evidence_required: [snapshot, console]
    convert_to_regression_test: true
    executable_steps:
      - action: navigate
        path: /checkout
      - action: fill
        locator:
          strategy: label
          value: Email
        value: not-an-email
      - action: click
        locator:
          strategy: role
          role: button
          name: Continue
      - action: assert_visible
        locator:
          strategy: text
          value: Enter a valid email address
