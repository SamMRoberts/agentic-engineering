<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Web Frontend Report Viewer</title>
</head>

<body>
    <main class="app" id="app">
        <header class="header">
            <div class="header-row">
                <h1 class="title">Web Frontend Testing Report</h1>
                <button id="open-html-btn" class="link-btn" type="button" hidden>Open static HTML report</button>
            </div>
            <dl class="meta" id="meta"></dl>
        </header>

        <section class="risk" aria-labelledby="risk-heading">
            <h2 id="risk-heading">Risk Overview</h2>
            <ul class="filter-row" id="filter-row" role="group" aria-label="Filter findings by severity"></ul>
        </section>

        <section class="findings" aria-labelledby="findings-heading">
            <h2 id="findings-heading">Findings (<span id="visible-count">0</span>)</h2>
            <ul class="finding-list" id="finding-list"></ul>
            <p class="empty" id="empty-state" hidden>No findings match the current filter.</p>
        </section>

        <section class="warnings" id="warnings" hidden>
            <h2>Loader warnings</h2>
            <ul id="warnings-list"></ul>
        </section>
    </main>
    <script type="module" src="/src/mcp-app.ts"></script>
</body>

</html>
