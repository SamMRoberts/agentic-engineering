name: Vibe Sentinel Gate

on:
  pull_request:
    branches: [main]

jobs:
  vibe-sentinel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Assumption gate
        run: node plugins/vibe-sentinel/scripts/assumption-gate.mjs check
      - name: Change control contract
        run: node plugins/vibe-sentinel/scripts/change-control.mjs check
      - name: Scope Guard plan
        run: node plugins/vibe-sentinel/scripts/scope-guard.mjs check
      - name: Change control drift
        run: node plugins/vibe-sentinel/scripts/change-control.mjs drift
